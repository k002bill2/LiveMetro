# Service Implementation - EXPERT
# LiveMetro: Distributed Sync with CRDT Conflict Resolution

id: task_svc_expert_001
name: "CRDT 기반 분산 동기화 엔진"
category: service
difficulty: expert

input:
  description: |
    여러 디바이스 간 충돌 없는 실시간 동기화를 위한
    CRDT(Conflict-free Replicated Data Types) 기반 동기화 엔진을 구현합니다.

    핵심 요구사항:
    1. G-Counter, PN-Counter, LWW-Register 구현
    2. Vector Clock으로 인과 관계 추적
    3. 3-way merge로 복잡한 충돌 해결
    4. Partial sync (델타 동기화)
    5. Network partition 시 Eventually Consistent 보장
    6. Byzantine fault tolerance 기본 구현
    7. Merkle tree로 효율적 차이 감지

  requirements:
    - "CRDT primitives 직접 구현 (라이브러리 없이)"
    - "Vector Clock with Lamport timestamps"
    - "3-way merge algorithm"
    - "Delta-state CRDT for bandwidth optimization"
    - "Anti-entropy protocol for consistency"
    - "Merkle tree diff for sync optimization"
    - "Network partition simulation 테스트"
    - "Eventually consistent guarantee 증명"

  context: |
    CRDT는 분산 시스템에서 충돌 없는 복제를 보장합니다.
    Vector Clock으로 이벤트 순서를 추적하고,
    Merkle tree로 효율적인 차이점 감지를 수행합니다.

success_criteria:
  required:
    typescript_no_errors: true
    test_coverage: 90
    crdt_primitives: true
    vector_clock: true
    three_way_merge: true
    delta_sync: true
    merkle_tree: true
    eventually_consistent: true
  optional:
    byzantine_tolerance: true
    compression: true
    batching: true

graders:
  - type: code
    weight: 0.4
    checks:
      - "has_g_counter"
      - "has_pn_counter"
      - "has_lww_register"
      - "has_vector_clock"
      - "has_merkle_tree"
      - "has_three_way_merge"
      - "has_delta_state"
      - "test_network_partition"
  - type: llm
    weight: 0.6
    rubric: code-quality-distributed
    criteria:
      - "CRDT semantics가 올바르게 구현되었는가"
      - "Vector Clock이 인과관계를 정확히 추적하는가"
      - "3-way merge가 모든 충돌 케이스를 처리하는가"
      - "Eventually consistent가 수학적으로 보장되는가"
      - "Merkle tree diff가 효율적인가"
      - "코드가 분산 시스템 전문가 수준인가"

max_attempts: 3
timeout_minutes: 40
tags:
  - service
  - distributed
  - crdt
  - sync
  - expert
expected_agent: backend-integration-specialist
pass_threshold: 0.75
