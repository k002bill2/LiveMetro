# UI Component - EXPERT
# LiveMetro: 3D Subway Map with Multi-touch Gestures

id: task_ui_expert_001
name: "3D 노선도 with 핀치/회전/팬 동시 제스처"
category: ui_component
difficulty: expert

input:
  description: |
    3D 시점으로 노선도를 표현하고, 복잡한 멀티터치 제스처를 지원하는
    고성능 인터랙티브 맵 컴포넌트를 구현합니다.

    핵심 요구사항:
    1. react-native-skia로 3D 변환 렌더링
    2. 핀치(줌) + 회전 + 팬 동시 제스처
    3. 제스처 충돌 해결 (gesture arbitration)
    4. 관성 스크롤 및 스냅 포인트
    5. 열차 위치 실시간 업데이트 (SharedValue)
    6. 60fps 유지 (1000개 이상 노드)
    7. 접근성 완벽 지원

  requirements:
    - "@shopify/react-native-skia로 GPU 가속 렌더링"
    - "3개 제스처 동시 처리 (Gesture.Race + Simultaneous)"
    - "제스처 우선순위 및 충돌 해결 로직"
    - "withDecay로 관성 스크롤 구현"
    - "스냅 포인트 (역 중심으로 스냅)"
    - "useFrameCallback으로 프레임 동기화"
    - "1000+ 노드에서 60fps 유지"
    - "VoiceOver/TalkBack 완벽 지원"

  context: |
    Skia Canvas에서 3D perspective transform 적용.
    제스처 우선순위: 핀치 > 회전 > 팬.
    1000개 이상의 역/열차 노드 렌더링 시 성능 최적화 필수.

success_criteria:
  required:
    typescript_no_errors: true
    test_coverage: 85
    uses_skia: true
    multi_gesture_simultaneous: true
    gesture_arbitration: true
    inertia_scroll: true
    fps_60_with_1000_nodes: true
    accessibility_complete: true
  optional:
    snap_points: true
    frame_callback_sync: true
    gpu_optimization: true

graders:
  - type: code
    weight: 0.4
    checks:
      - "imports: @shopify/react-native-skia"
      - "has_3d_transform"
      - "has_gesture_race_simultaneous"
      - "has_gesture_priority_logic"
      - "uses_withDecay"
      - "uses_useFrameCallback"
      - "renders_1000_nodes"
      - "accessibility_labels_complete"
  - type: llm
    weight: 0.6
    rubric: code-quality-expert
    criteria:
      - "3D 변환이 수학적으로 올바른가"
      - "제스처 충돌 해결이 자연스러운가"
      - "관성 스크롤이 부드러운가"
      - "1000+ 노드에서 60fps 유지하는가"
      - "GPU 최적화가 적절한가"
      - "코드가 확장 가능하고 유지보수하기 좋은가"

max_attempts: 3
timeout_minutes: 35
tags:
  - ui
  - 3d
  - skia
  - gesture
  - performance
  - expert
expected_agent: mobile-ui-specialist
pass_threshold: 0.80
