# Task: 컴포넌트 테스트 스위트 작성
id: task_test_001
name: "AgentCard 컴포넌트 종합 테스트 스위트"
category: test
difficulty: medium

description: |
  기존 AgentCard 컴포넌트에 대한 포괄적인 테스트 스위트를 작성합니다.
  행복 경로, 엣지 케이스, 에러 상태, 접근성, 사용자 인터랙션을
  모두 커버하는 테스트가 필요합니다.

acceptance_criteria:
  - Vitest + React Testing Library 사용
  - 행복 경로 테스트 (최소 5개)
  - 엣지 케이스 테스트 (빈 데이터, 긴 텍스트, null 값)
  - 에러 상태 테스트 (네트워크 실패, 잘못된 props)
  - 접근성 테스트 (aria 속성, 키보드 네비게이션)
  - 사용자 인터랙션 테스트 (클릭, 호버, 키보드)
  - 스냅샷 테스트 (상태별 렌더링)
  - 테스트 팩토리/헬퍼 함수
  - describe/it 구조로 시나리오별 그룹화
  - 최소 20개 테스트 케이스
  - 커버리지 90% 이상 목표

input:
  prompt: |
    AgentCard 컴포넌트에 대한 종합 테스트 스위트를 작성해주세요.

    ## 테스트 대상
    기존 `src/dashboard/src/components/agents/AgentCard.tsx` 컴포넌트

    ## 테스트 범위

    ### 1. 렌더링 테스트
    - 기본 props로 정상 렌더링
    - 모든 에이전트 상태별 렌더링 (available, busy, offline)
    - 긴 이름/설명 텍스트 처리
    - 도구 수 0개일 때
    - 선택 속성 없을 때 기본값

    ### 2. 인터랙션 테스트
    - 카드 클릭 시 onSelect 콜백 호출
    - 더블 클릭 방지
    - disabled 상태에서 클릭 무시
    - 키보드 Enter/Space로 선택

    ### 3. 접근성 테스트
    - aria-label 존재 확인
    - role 속성 확인
    - 스크린리더 텍스트 확인
    - 포커스 관리 (Tab 순서)
    - 색상 대비 (상태 배지)

    ### 4. 엣지 케이스
    - undefined/null props 처리
    - 빈 문자열 props
    - 매우 긴 문자열 (1000자+)
    - 특수 문자 포함 이름
    - XSS 시도 문자열

    ### 5. 스냅샷
    - 각 상태별 스냅샷
    - 다크모드 스냅샷

    ## 테스트 헬퍼
    ```typescript
    // renderAgentCard 팩토리
    // createMockAgent 팩토리
    // 공통 assertion 헬퍼
    ```
  context_files:
    - src/dashboard/src/components/agents/AgentCard.tsx
    - src/dashboard/src/types/index.ts
  dependencies: []

expected_output:
  files:
    - src/dashboard/src/components/agents/__tests__/AgentCard.comprehensive.test.tsx
    - src/dashboard/src/components/agents/__tests__/helpers.ts
  patterns:
    - "describe\\("
    - "it\\(|test\\("
    - "expect\\("
    - "render\\("
    - "screen\\."
    - "fireEvent|userEvent|click|keyboard"
    - "aria-label|getByRole|getByLabelText"
    - "toMatchSnapshot|toMatchInlineSnapshot"
    - "beforeEach|afterEach"
    - "mock|Mock|vi\\.fn|jest\\.fn"
  forbidden_patterns:
    - ": any"
    - "// @ts-ignore"
    - "console\\.log"
    - "skip\\(|xit\\(|xdescribe\\("

evaluation:
  timeout_minutes: 20
  rubric: test.yaml
  weights:
    code_checks: 40
    llm_grading: 60
  passing_score: 0.7

metadata:
  created_at: 2026-03-30
  author: system
  tags: [test, react, vitest, testing-library, coverage, medium]
  recommended_agent: test-automation-specialist
