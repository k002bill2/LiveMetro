    - "class OptimisticUpdate|optimistic|rollback|snapshot"
    - "sequence|sequenceNumber|reorder|buffer"
    - "invalidate|cache.*invalid|stale"
    - "create<|useStore"
    # Backend
    - "ETag|If-Match|etag|version"
    - "409|Conflict|conflict"
    - "sequence_number|seq_num"
    - "@router\\.(get|put)"
    # Shared
    - "async|await"
    - "test|describe|expect|assert"
  forbidden_patterns:
    - ": any"
    - "// @ts-ignore"
    - "# type: ignore"
    - "console\\.log"
    - "print\\("

