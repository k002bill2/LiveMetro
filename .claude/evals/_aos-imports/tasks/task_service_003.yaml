# Task: Distributed Task Scheduler
id: task_service_003
name: "분산 태스크 스케줄러 엔진"
category: service
difficulty: expert

description: |
  비동기 태스크를 우선순위 큐에 등록하고, 의존성 그래프를 기반으로
  실행 순서를 결정하며, 워커 풀에서 병렬 실행하는 스케줄러를 구현합니다.

  재시도, 타임아웃, 데드라인, 태스크 의존성(DAG),
  워커 풀 관리, 실행 상태 모니터링을 포함해야 합니다.

acceptance_criteria:
  - FastAPI 라우터로 태스크 등록/조회/취소 API
  - 우선순위 큐 (heapq 기반, 우선순위 + FIFO)
  - DAG 의존성 관리 (위상 정렬로 실행 순서 결정)
  - 순환 의존성 감지 및 거부
  - 워커 풀 (asyncio 기반, configurable 동시성)
  - 태스크 라이프사이클 (pending → queued → running → completed/failed/cancelled)
  - 재시도 (태스크별 max_retries, exponential backoff)
  - 타임아웃 (태스크별 timeout, asyncio.wait_for)
  - 데드라인 (absolute deadline, 초과 시 자동 취소)
  - 실행 상태 모니터링 API (큐 깊이, 워커 상태, 처리량)
  - 그레이스풀 셧다운 (진행 중 태스크 완료 대기)
  - Pydantic 모델로 태스크/이벤트 스키마
  - 테스트 (최소 20개: 스케줄링, 의존성, 재시도, 취소, 동시성)
  - 타입 힌트 완전 적용

input:
  prompt: |
    분산 태스크 스케줄러를 구현해주세요.

    ## 아키텍처
    ```
    TaskScheduler (메인 엔진)
    ├── PriorityQueue (우선순위 큐)
    │   └── heapq 기반, (priority, timestamp, task_id) 튜플
    ├── DependencyResolver (DAG 의존성)
    │   └── 위상 정렬, 순환 감지 (DFS coloring)
    ├── WorkerPool (워커 풀)
    │   ├── Worker (개별 워커)
    │   └── asyncio.Semaphore 기반 동시성 제어
    ├── RetryPolicy (재시도 정책)
    │   └── 태스크별 max_retries, backoff 전략
    └── TaskRegistry (태스크 저장소)
        └── 인메모리 (dict), 태스크 상태 추적
    ```

    ## API 엔드포인트
    ```
    POST   /api/v1/scheduler/tasks              - 태스크 등록
    GET    /api/v1/scheduler/tasks               - 태스크 목록 (필터: status, priority)
    GET    /api/v1/scheduler/tasks/{id}          - 태스크 상세
    DELETE /api/v1/scheduler/tasks/{id}          - 태스크 취소
    POST   /api/v1/scheduler/tasks/{id}/retry    - 수동 재시도
    GET    /api/v1/scheduler/status              - 스케줄러 상태 (큐, 워커, 처리량)
    POST   /api/v1/scheduler/start               - 스케줄러 시작
    POST   /api/v1/scheduler/stop                - 그레이스풀 셧다운
    ```

    ## 태스크 정의
    ```python
    class TaskDefinition(BaseModel):
        id: str = Field(default_factory=lambda: str(uuid4()))
        name: str
        handler: str                    # 실행할 함수 경로
        args: dict = {}
        priority: int = 5              # 1(최고) ~ 10(최저)
        depends_on: list[str] = []     # 의존 태스크 ID 목록
        max_retries: int = 3
        timeout_seconds: int = 300
        deadline: datetime | None = None
        metadata: dict = {}

    class TaskStatus(str, Enum):
        PENDING = "pending"
        QUEUED = "queued"
        RUNNING = "running"
        COMPLETED = "completed"
        FAILED = "failed"
        CANCELLED = "cancelled"
        TIMED_OUT = "timed_out"
    ```

    ## 실행 흐름
    ```
    등록 → 의존성 검증 → 큐 삽입 → 의존성 완료 대기 →
    워커 배정 → 실행 (타임아웃 감시) → 완료/실패
                                         ↓ (실패)
                                    재시도 판정 → 큐 재삽입 또는 최종 실패
    ```

    ## 동시성 제어
    - asyncio.Semaphore(max_workers)로 워커 수 제한
    - asyncio.wait_for(task, timeout)로 타임아웃
    - asyncio.Event로 셧다운 시그널
    - Lock으로 큐/레지스트리 원자적 접근
  context_files:
    - src/backend/orchestrator/engine.py
    - src/backend/orchestrator/parallel.py
  dependencies: []

expected_output:
  files:
    - src/backend/services/scheduler/engine.py
    - src/backend/services/scheduler/priority_queue.py
    - src/backend/services/scheduler/dependency_resolver.py
    - src/backend/services/scheduler/worker_pool.py
    - src/backend/services/scheduler/retry_policy.py
    - src/backend/api/v1/scheduler.py
    - tests/backend/services/test_task_scheduler.py
  patterns:
    - "class TaskScheduler|class.*Scheduler"
    - "heapq|heappush|heappop|PriorityQueue"
    - "topological|toposort|DFS|indegree"
    - "asyncio\\.Semaphore|asyncio\\.Event|asyncio\\.Lock"
    - "asyncio\\.wait_for|asyncio\\.gather"
    - "class.*Worker|WorkerPool"
    - "retry|RetryPolicy|backoff"
    - "class TaskDefinition|BaseModel"
    - "Enum|PENDING|RUNNING|COMPLETED|FAILED"
    - "@router\\.(get|post|delete)"
  forbidden_patterns:
    - "pass  # TODO"
    - "# type: ignore"
    - "print\\("
    - "import \\*"
    - "time\\.sleep"

evaluation:
  timeout_minutes: 50
  rubric: service.yaml
  weights:
    code_checks: 30
    llm_grading: 70
  passing_score: 0.80

