# AI Agent Evaluation Task Schema
# 모든 태스크 정의 파일은 이 스키마를 따릅니다.

schema_version: "1.0"

task:
  # 필수 필드
  id: string                    # 고유 ID (예: task_ui_001)
  name: string                  # 태스크 이름
  category: enum                # ui_component | service | bug_fix | refactor | integration | api | test
  difficulty: enum              # easy | medium | hard | expert

  # 태스크 설명
  description: string           # 상세 설명
  acceptance_criteria: list     # 합격 기준 목록

  # 입력 컨텍스트
  input:
    prompt: string              # 에이전트에게 전달할 프롬프트
    context_files: list         # 참조할 파일 목록 (선택)
    dependencies: list          # 필요한 의존성 (선택)

  # 예상 출력
  expected_output:
    files: list                 # 생성/수정될 파일 목록
    patterns: list              # 코드에 포함되어야 할 패턴 (선택)
    forbidden_patterns: list    # 코드에 포함되면 안 되는 패턴 (선택)

  # 평가 설정
  evaluation:
    timeout_minutes: number     # 타임아웃 (기본: 15)
    rubric: string              # 사용할 루브릭 파일
    weights:                    # 평가 가중치
      code_checks: number       # 코드 검사 비중 (0-100)
      llm_grading: number       # LLM 평가 비중 (0-100)
    passing_score: number       # 합격 점수 (0-1, 기본: 0.7)

  # 메타데이터
  metadata:
    created_at: date
    author: string
    tags: list
    recommended_agent: string   # 권장 에이전트 (선택)

# 예시
example:
  id: task_ui_001
  name: "AgentCard 컴포넌트 생성"
  category: ui_component
  difficulty: medium
  description: |
    에이전트 정보를 표시하는 AgentCard 컴포넌트를 생성합니다.
    카드에는 에이전트 이름, 상태, 사용 가능한 도구 수가 표시되어야 합니다.
  acceptance_criteria:
    - TypeScript로 작성
    - Tailwind CSS 스타일링
    - 접근성 레이블 포함
    - 테스트 파일 포함
  input:
    prompt: "에이전트 정보를 표시하는 AgentCard 컴포넌트를 생성해주세요."
    context_files:
      - src/dashboard/src/types/index.ts
  expected_output:
    files:
      - src/dashboard/src/components/agents/AgentCard.tsx
      - src/dashboard/src/components/agents/AgentCard.test.tsx
    patterns:
      - "interface.*Props"
      - "export.*AgentCard"
    forbidden_patterns:
      - ": any"
      - "// @ts-ignore"
  evaluation:
    timeout_minutes: 15
    rubric: ui_component.yaml
    weights:
      code_checks: 40
      llm_grading: 60
    passing_score: 0.7
  metadata:
    created_at: 2025-01-28
    author: system
    tags: [react, component, ui]
    recommended_agent: web-ui-specialist
