# Task: 페이지네이션 컴포넌트 생성
id: task_ui_002
name: "Pagination 컴포넌트 생성"
category: ui_component
difficulty: easy

description: |
  재사용 가능한 페이지네이션 컴포넌트를 생성합니다.
  현재 페이지, 총 페이지 수를 표시하고 이전/다음 버튼을 제공합니다.

acceptance_criteria:
  - TypeScript로 작성
  - Tailwind CSS 스타일링
  - 이전/다음 버튼
  - 현재 페이지 표시
  - 첫/마지막 페이지에서 버튼 비활성화
  - 테스트 파일 포함

input:
  prompt: |
    재사용 가능한 Pagination 컴포넌트를 생성해주세요.

    Props:
    - currentPage: number
    - totalPages: number
    - onPageChange: (page: number) => void

    요구사항:
    - 이전/다음 버튼
    - 페이지 번호 직접 클릭 가능
    - 첫/마지막 페이지에서 버튼 비활성화
    - Tailwind CSS 사용
  context_files: []
  dependencies: []

expected_output:
  files:
    - src/dashboard/src/components/common/Pagination.tsx
    - src/dashboard/src/components/common/Pagination.test.tsx
  patterns:
    - "interface.*Props"
    - "export.*Pagination"
    - "disabled"
    - "onClick"
  forbidden_patterns:
    - ": any"
    - "// @ts-ignore"

evaluation:
  timeout_minutes: 10
  rubric: ui_component.yaml
  weights:
    code_checks: 40
    llm_grading: 60
  passing_score: 0.7

metadata:
  created_at: 2025-01-28
  author: system
  tags: [react, component, ui, pagination]
  recommended_agent: web-ui-specialist
