# Task: Agent 서비스 API 엔드포인트
id: task_service_001
name: "Agent CRUD API 엔드포인트"
category: service
difficulty: medium

description: |
  에이전트(Agent) 관리를 위한 CRUD API 엔드포인트를 구현합니다.
  GET /agents, GET /agents/{id}, POST /agents,
  PUT /agents/{id}, DELETE /agents/{id} 엔드포인트가 필요합니다.

acceptance_criteria:
  - FastAPI 라우터로 구현
  - Pydantic 모델로 입력/출력 검증
  - 적절한 HTTP 상태 코드 반환
  - 에러 핸들링 포함
  - 비동기 처리 (async/await)
  - 테스트 파일 포함

input:
  prompt: |
    에이전트(Agent) 관리를 위한 CRUD API를 구현해주세요.

    엔드포인트:
    - GET /api/v1/agents - 목록 조회 (페이지네이션)
    - GET /api/v1/agents/{id} - 단일 조회
    - POST /api/v1/agents - 생성
    - PUT /api/v1/agents/{id} - 수정
    - DELETE /api/v1/agents/{id} - 삭제

    요구사항:
    - FastAPI 라우터 사용
    - Pydantic 모델로 검증
    - 적절한 에러 처리 (404, 400, 500)
    - 비동기 처리
  context_files:
    - src/backend/models/agent.py
    - src/backend/api/routes.py
  dependencies: []

expected_output:
  files:
    - src/backend/api/v1/agents.py
    - tests/backend/api/test_agents.py
  patterns:
    - "@router.get"
    - "@router.post"
    - "async def"
    - "-> .*:"
    - "HTTPException"
  forbidden_patterns:
    - "pass  # TODO"
    - "# type: ignore"

evaluation:
  timeout_minutes: 20
  rubric: service.yaml
  weights:
    code_checks: 40
    llm_grading: 60
  passing_score: 0.7

metadata:
  created_at: 2025-01-28
  author: system
  tags: [api, fastapi, crud, agent]
  recommended_agent: backend-integration-specialist
