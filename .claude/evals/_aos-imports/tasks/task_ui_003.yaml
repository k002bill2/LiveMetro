# Task: 가상 스크롤 DataTable 컴포넌트
id: task_ui_003
name: "VirtualizedDataTable 컴포넌트 생성"
category: ui_component
difficulty: hard

description: |
  대량 데이터(10,000+ rows)를 처리할 수 있는 가상 스크롤 DataTable을 생성합니다.
  정렬, 필터링, 컬럼 리사이즈, 행 선택, 키보드 네비게이션을 지원해야 합니다.
  React.memo와 virtualization으로 60fps 스크롤 성능을 보장해야 합니다.

acceptance_criteria:
  - TypeScript 제네릭으로 타입 안전한 컬럼/데이터 정의
  - 가상 스크롤 (viewport에 보이는 행만 렌더링)
  - 멀티 컬럼 정렬 (Shift+클릭으로 보조 정렬)
  - 컬럼별 필터링 (text, number range, select)
  - 컬럼 리사이즈 (드래그로 너비 조절)
  - 체크박스 행 선택 (전체 선택/해제)
  - 키보드 네비게이션 (Arrow keys, Enter, Space)
  - 빈 상태, 로딩 상태, 에러 상태 처리
  - React.memo, useMemo, useCallback으로 성능 최적화
  - 접근성 (role="grid", aria-sort, aria-selected)
  - 테스트 파일 포함 (최소 15개 케이스)
  - `: any` 타입 금지

input:
  prompt: |
    대량 데이터를 처리하는 VirtualizedDataTable 컴포넌트를 생성해주세요.

    요구사항:
    1. 제네릭 타입 지원: `<T extends Record<string, unknown>>`
    2. Props:
       - data: T[]
       - columns: ColumnDef<T>[]
       - rowHeight?: number (기본: 40)
       - headerHeight?: number (기본: 48)
       - maxHeight?: number (기본: 600)
       - onRowSelect?: (selected: T[]) => void
       - onSort?: (sort: SortConfig[]) => void
       - onFilter?: (filters: FilterConfig[]) => void
       - isLoading?: boolean
       - error?: string
       - emptyMessage?: string

    3. ColumnDef<T> 타입:
       - key: keyof T
       - title: string
       - width?: number
       - minWidth?: number
       - sortable?: boolean
       - filterable?: boolean
       - filterType?: 'text' | 'number' | 'select'
       - filterOptions?: string[] (for select type)
       - render?: (value: T[keyof T], row: T) => ReactNode

    4. 성능 요구사항:
       - 10,000행 이상에서도 60fps 스크롤
       - 가상 스크롤로 DOM 노드 최소화
       - 불필요한 리렌더링 방지

    5. 키보드:
       - ArrowUp/Down: 행 이동
       - ArrowLeft/Right: 셀 이동
       - Enter: 행 선택
       - Space: 체크박스 토글
       - Escape: 선택 해제

    기존 컴포넌트 패턴은 src/dashboard/src/components/AgentCard.tsx를 참조하세요.
  context_files:
    - src/dashboard/src/components/AgentCard.tsx
    - src/dashboard/src/lib/utils.ts
  dependencies: []

expected_output:
  files:
    - src/dashboard/src/components/common/VirtualizedDataTable.tsx
    - src/dashboard/src/components/common/VirtualizedDataTable.test.tsx
  patterns:
    - "interface ColumnDef"
    - "export.*VirtualizedDataTable"
    - "React\\.memo|memo\\("
    - "useMemo|useCallback"
    - "role=\"grid\""
    - "aria-sort"
    - "onScroll|scrollTop|overflow"
    - "translateY|transform"
  forbidden_patterns:
    - ": any"
    - "// @ts-ignore"
    - "// @ts-nocheck"
    - "dangerouslySetInnerHTML"

evaluation:
  timeout_minutes: 30
  rubric: ui_component.yaml
  weights:
    code_checks: 40
    llm_grading: 60
  passing_score: 0.75

metadata:
  created_at: 2026-02-13
  author: system
  tags: [react, component, ui, virtual-scroll, data-table, performance, hard]
  recommended_agent: web-ui-specialist
