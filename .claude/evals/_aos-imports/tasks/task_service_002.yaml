# Task: 인증 미들웨어 + Rate Limiting + 캐싱이 포함된 API
id: task_service_002
name: "Agent Registry API with Auth, Rate Limit, Cache"
category: service
difficulty: hard

description: |
  Agent Registry를 위한 API를 구현합니다.
  JWT 인증 미들웨어, 역할 기반 접근 제어(RBAC), Redis 기반 Rate Limiting,
  In-memory 캐싱, 복합 쿼리 필터링을 모두 포함해야 합니다.

  보안, 성능, 확장성을 모두 고려한 프로덕션 수준의 API를 구현해야 합니다.

acceptance_criteria:
  - FastAPI + Pydantic v2
  - JWT 인증 미들웨어 (access_token + refresh_token)
  - RBAC (admin, manager, user 역할별 접근 제어)
  - Rate Limiting (IP 기반 + 사용자 기반, 슬라이딩 윈도우)
  - In-memory 캐싱 (TTL 기반, 캐시 무효화 전략)
  - 복합 쿼리 필터링 (AND/OR 조건, 범위 필터, 텍스트 검색)
  - 페이지네이션 (커서 기반 + 오프셋 기반 모두 지원)
  - 비동기 처리 (async/await)
  - 적절한 HTTP 상태 코드와 에러 응답 표준화
  - 테스트 (최소 20개 케이스: 인증, RBAC, 레이트 리밋, CRUD, 에러)
  - 타입 힌트 완전 적용

input:
  prompt: |
    Agent Registry API를 구현해주세요.

    엔드포인트:
    - POST   /api/v1/auth/login      - JWT 토큰 발급
    - POST   /api/v1/auth/refresh    - 토큰 갱신
    - GET    /api/v1/agents          - 목록 조회 (복합 필터링)
    - GET    /api/v1/agents/{id}     - 단일 조회 (캐싱)
    - POST   /api/v1/agents          - 생성 (admin만)
    - PUT    /api/v1/agents/{id}     - 수정 (admin/manager)
    - DELETE /api/v1/agents/{id}     - 삭제 (admin만)
    - GET    /api/v1/agents/stats    - 통계 (캐싱)

    인증 요구사항:
    - JWT (HS256, 30분 만료)
    - Refresh Token (7일 만료)
    - 역할: admin > manager > user
    - admin: 모든 권한
    - manager: 조회 + 수정
    - user: 조회만

    Rate Limiting:
    - 익명: 10 req/min
    - 인증: 100 req/min
    - admin: 무제한
    - 슬라이딩 윈도우 알고리즘

    캐싱:
    - GET /agents/{id}: 5분 TTL
    - GET /agents/stats: 1분 TTL
    - POST/PUT/DELETE 시 관련 캐시 무효화

    필터링 (GET /agents):
    - ?status=available,busy (다중 값)
    - ?category=development (단일 값)
    - ?min_success_rate=0.8 (범위)
    - ?search=keyword (이름+설명 검색)
    - ?sort=name:asc,success_rate:desc (다중 정렬)
    - ?cursor=xxx (커서 기반 페이지네이션)
    - ?page=1&page_size=20 (오프셋 기반)
  context_files:
    - src/backend/api/agents.py
    - src/backend/api/routes.py
  dependencies: []

expected_output:
  files:
    - src/backend/api/v1/agent_registry.py
    - src/backend/api/v1/auth_middleware.py
    - src/backend/api/v1/rate_limiter.py
    - tests/backend/api/test_agent_registry.py
  patterns:
    - "@router\\.(get|post|put|delete)"
    - "async def"
    - "Depends\\("
    - "HTTPException"
    - "jwt\\.|jose\\.|JWT"
    - "class.*Middleware|def.*middleware"
    - "rate_limit|RateLimit"
    - "cache|Cache|TTL"
  forbidden_patterns:
    - "pass  # TODO"
    - "# type: ignore"
    - "print\\("
    - "import \\*"

evaluation:
  timeout_minutes: 45
  rubric: service.yaml
  weights:
    code_checks: 35
    llm_grading: 65
  passing_score: 0.75

metadata:
  created_at: 2026-02-13
  author: system
  tags: [api, fastapi, auth, jwt, rbac, rate-limit, cache, hard]
  recommended_agent: backend-integration-specialist
