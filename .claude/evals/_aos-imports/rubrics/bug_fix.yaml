# Bug Fix Evaluation Rubric
# 버그 수정 태스크 평가 기준

rubric_id: bug_fix
version: "1.0"
description: 버그 수정 품질 평가 루브릭

# 코드 검사 (자동화 가능)
code_checks:
  fix_applied:
    weight: 20
    description: 수정 사항 적용 여부
    checks:
      - type: file_modified
        pattern: "{expected_files}"

  test_added:
    weight: 15
    description: 회귀 테스트 추가
    checks:
      - type: pattern_present
        pattern: "test.*bug|regression|fix"
        message: "버그 관련 테스트 필요"

  no_regressions:
    weight: 15
    description: 기존 테스트 통과
    checks:
      - type: tests_pass
        command: "npm test"

# LLM 평가 기준
llm_grading:
  dimensions:
    root_cause_analysis:
      weight: 25
      description: 근본 원인 분석
      criteria:
        5: 정확한 원인 파악, 명확한 설명
        4: 원인 잘 파악, 사소한 부분 누락
        3: 대략적인 원인 파악
        2: 원인 파악 부정확
        1: 원인 파악 실패

    fix_quality:
      weight: 30
      description: 수정 품질
      criteria:
        5: 최소 침습적 수정, 부작용 없음, 클린 코드
        4: 좋은 수정, 사소한 개선 여지
        3: 기능적으로 동작하는 수정
        2: 수정이 불완전하거나 부작용 존재
        1: 수정이 새로운 문제 야기

    test_coverage:
      weight: 25
      description: 테스트 커버리지
      criteria:
        5: 엣지 케이스 포함, 회귀 방지 완벽
        4: 좋은 테스트 커버리지
        3: 기본적인 테스트
        2: 테스트 부족
        1: 테스트 없음

    documentation:
      weight: 20
      description: 문서화/설명
      criteria:
        5: 명확한 커밋 메시지, 코드 주석
        4: 좋은 문서화
        3: 기본적인 설명
        2: 설명 부족
        1: 설명 없음

# 점수 계산
scoring:
  code_checks_total: 50
  llm_grading_total: 50
  passing_threshold: 0.75  # 버그 수정은 더 높은 기준

# 피드백 템플릿
feedback_template: |
  ## 코드 검사 결과 ({code_score}%)
  {code_feedback}

  ## LLM 평가 결과 ({llm_score}%)
  {llm_feedback}

  ## 총점: {total_score}%
  ## 결과: {result}

  ## 개선 제안
  {suggestions}
