name: EAS Build (Production)

# 태그 푸시 시 production 빌드 트리거. main 브랜치 commit에서는 실행되지 않음.
# Required secrets:
#   EXPO_TOKEN — Expo robot 계정 토큰 (eas-cli 인증)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      platform:
        description: Build platform
        type: choice
        required: true
        default: all
        options: [all, ios, android]
      profile:
        description: EAS profile
        type: choice
        required: true
        default: production
        options: [production, preview]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Quality gate (no Functions rebuild — already verified on main)
        uses: ./.github/actions/quality-gate
        with:
          node-version: '18'
          run-functions-build: 'false'

  build:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS build
        run: |
          eas build \
            --platform ${{ inputs.platform || 'all' }} \
            --profile ${{ inputs.profile || 'production' }} \
            --non-interactive \
            --no-wait
