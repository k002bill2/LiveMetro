name: Firebase Deploy

# main push 시 Cloud Functions + Firestore rules/indexes 자동 배포.
# PR 또는 다른 브랜치에서는 실행되지 않음.
#
# Required secrets:
#   FIREBASE_SERVICE_ACCOUNT — JSON 형식의 서비스 계정 키
#                              firebase-tools deploy 권한 필요

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Quality gate
        uses: ./.github/actions/quality-gate
        with:
          node-version: '20'
          run-functions-build: 'true'

  deploy:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Functions
        working-directory: functions
        run: npm run build

      # functions/.env는 gitignored — clean checkout에는 없으므로 여기서 생성한다.
      # 없으면 firebase-tools가 defineString('KAKAO_APP_ID') 기본값('')으로 배포해
      # kakaoLogin이 모든 요청을 failed-precondition으로 거부한다.
      # KAKAO_APP_ID는 Kakao 앱의 공개 식별자(자격증명 아님)라 평문으로 안전하다.
      - name: Provision Functions params (KAKAO_APP_ID)
        working-directory: functions
        run: echo "KAKAO_APP_ID=1514990" > .env

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Functions + Firestore rules
        run: npx --yes firebase-tools deploy --only functions,firestore:rules,firestore:indexes --non-interactive

      - name: Cleanup credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
